<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>2026年度 勤務カレンダー</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root{
      --bg:#f3f4f6;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --sun:#e58b8b;
      --company:#cfe1fb;
      --recommended:#a3e635;
      --border:#d1d5db;
      --accent:#2563eb;
      --today:#111827;
      --notice:#dbeafe;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Yu Gothic UI","YuGothic",Meiryo,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    header{
      position:sticky; top:0; z-index:30;
      background:#111827; color:#fff;
      padding:14px 16px 12px;
      box-shadow:0 2px 8px rgba(0,0,0,.15);
    }
    .title{font-size:20px;font-weight:700;margin:0 0 8px}
    .sub{font-size:12px;opacity:.9;margin:0 0 12px}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap}
    button, select{
      border:none;border-radius:999px;padding:10px 14px;font-size:14px;font-weight:700;
      background:#e5e7eb;color:#111827;
    }
    button.primary{background:#3b82f6;color:#fff}
    select{
      border:1px solid rgba(255,255,255,.18);
      background:#fff;
      appearance:none;
      -webkit-appearance:none;
      max-width:160px;
    }
    .month-tabs{
      display:flex;gap:8px;overflow:auto;padding:10px 16px 8px;
      background:var(--bg); position:sticky; top:98px; z-index:22;
      border-bottom:1px solid rgba(0,0,0,.04);
    }
    .month-tab{
      flex:0 0 auto; border:1px solid var(--border); background:#fff; color:#111827;
      border-radius:999px; padding:9px 12px; font-size:13px; font-weight:700;
    }
    .month-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .notice-wrap{
      position:sticky; top:149px; z-index:21;
      padding:8px 12px 0;
      background:linear-gradient(var(--bg), rgba(243,244,246,.95));
    }
    .notice{
      max-width:720px; margin:0 auto;
      background:var(--notice);
      border:1px solid #93c5fd;
      color:#1e3a8a;
      border-radius:14px;
      padding:10px 12px;
      font-size:13px;
      font-weight:700;
      box-shadow:0 4px 10px rgba(0,0,0,.04);
    }
    .fixed-legend-wrap{
      position:sticky; top:202px; z-index:20;
      padding:8px 12px 0;
      background:linear-gradient(var(--bg), rgba(243,244,246,.92));
    }
    .fixed-legend{
      max-width:720px;
      margin:0 auto;
      background:#fff;
      border-radius:14px;
      padding:10px 12px;
      box-shadow:0 4px 12px rgba(0,0,0,.06);
      display:flex; gap:12px; flex-wrap:wrap;
      font-size:12px; font-weight:700;
      border:1px solid rgba(0,0,0,.05);
    }
    .legend-item{display:flex;align-items:center;gap:8px}
    .swatch{
      width:18px;height:12px;border-radius:4px;border:1px solid rgba(0,0,0,.15);flex:0 0 auto;
    }
    .swatch.sun{background:var(--sun)}
    .swatch.company{background:var(--company)}
    .swatch.recommended{background:var(--recommended);border-radius:999px;height:16px}
    .swatch.today{background:#fff;border:2px solid var(--today);height:16px}
    main{padding:12px 14px 100px;max-width:720px;margin:0 auto}
    .card{
      background:var(--card); border-radius:18px; padding:14px;
      box-shadow:0 6px 20px rgba(0,0,0,.08); margin-bottom:14px;
    }
    .month-title{
      display:flex; justify-content:space-between; align-items:end; margin-bottom:10px;
    }
    .month-title h2{margin:0;font-size:24px}
    .weekdays,.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
    .weekdays div{text-align:center;font-weight:700;font-size:12px;color:var(--muted);padding-bottom:4px}
    .day{
      min-height:52px; background:#fff; border:1px solid var(--border); border-radius:14px;
      padding:6px 4px; position:relative; display:flex; align-items:flex-start; justify-content:center;
      font-weight:700; font-size:16px;
      transition:transform .08s ease;
    }
    .day.empty{background:#f9fafb;color:#d1d5db}
    .day.sunoff{background:var(--sun)}
    .day.companyoff{background:var(--company)}
    .day.recommended::after{
      content:""; position:absolute; width:34px; height:26px; border-radius:999px;
      background:rgba(163,230,53,.9); border:2px solid rgba(17,24,39,.55);
      top:50%; left:50%; transform:translate(-50%,-50%); z-index:0;
    }
    .day.today{
      outline:3px solid var(--today);
      outline-offset:2px;
      box-shadow:0 0 0 4px rgba(255,255,255,.85);
    }
    .day.today span{
      font-size:18px;
    }
    .day span{position:relative; z-index:1}
    .daylabel{
      position:absolute; bottom:3px; right:4px; font-size:9px; color:#4b5563; font-weight:700;
      z-index:1;
    }
    .today-badge{
      position:absolute;
      top:3px; left:4px;
      font-size:8px;
      background:#111827; color:#fff;
      padding:2px 5px;
      border-radius:999px;
      z-index:2;
    }
    ul.holidays{margin:10px 0 0;padding-left:18px}
    ul.holidays li{margin:4px 0;line-height:1.5}
    .footer-note{color:var(--muted);font-size:12px;line-height:1.6}
  </style>
</head>
<body>
<header>
  <div class="title">2026年度 勤務カレンダー</div>
  <div class="sub">今日の強調 / 月ジャンプ / 固定凡例 / 通知風表示つき</div>
  <div class="toolbar">
    <button id="jumpToday" class="primary">今月へ</button>
    <select id="monthSelect" aria-label="月を選択">
      <option value="">月へジャンプ</option>
    </select>
  </div>
</header>

<div class="month-tabs" id="monthTabs"></div>

<div class="notice-wrap">
  <div class="notice" id="noticeBox">読み込み中...</div>
</div>

<div class="fixed-legend-wrap">
  <div class="fixed-legend">
    <div class="legend-item"><span class="swatch today"></span><span>今日</span></div>
    <div class="legend-item"><span class="swatch sun"></span><span>日曜・休みの祝日</span></div>
    <div class="legend-item"><span class="swatch company"></span><span>会社独自の休日</span></div>
    <div class="legend-item"><span class="swatch recommended"></span><span>有給休暇推奨日</span></div>
  </div>
</div>

<main id="app"></main>

<script>
const weekdayLabels = ["日","月","火","水","木","金","土"];
function ymd(y,m,d){ return `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`; }

const officialHolidays = {
  "2026-04-29":"昭和の日",
  "2026-05-03":"憲法記念日",
  "2026-05-04":"みどりの日",
  "2026-05-05":"こどもの日",
  "2026-05-06":"振替休日（5/3分）",
  "2026-07-20":"海の日",
  "2026-08-11":"山の日",
  "2026-09-21":"敬老の日",
  "2026-09-22":"国民の休日",
  "2026-09-23":"秋分の日",
  "2026-10-12":"スポーツの日",
  "2026-11-03":"文化の日",
  "2026-11-23":"勤労感謝の日",
  "2027-01-01":"元日",
  "2027-01-11":"成人の日",
  "2027-02-11":"建国記念の日",
  "2027-02-23":"天皇誕生日",
  "2027-03-21":"春分の日",
  "2027-03-22":"振替休日（3/21分）"
};

const holidayWorkdays = new Set([
  "2026-05-06",
  "2026-07-20",
  "2026-09-21",
  "2026-09-22",
  "2026-09-23",
  "2026-10-12",
  "2026-11-03",
  "2026-11-23",
  "2027-01-11",
  "2027-02-11",
  "2027-02-23",
  "2027-03-22"
]);

const recommended = new Set([
  "2026-07-20","2026-09-21","2026-10-12","2026-11-03","2027-02-23"
]);

const companyOff = new Set([
  "2026-04-04","2026-04-11","2026-04-18","2026-04-25","2026-04-30",
  "2026-05-01","2026-05-02","2026-05-09","2026-05-16","2026-05-23","2026-05-30",
  "2026-06-06","2026-06-13","2026-06-20","2026-06-27",
  "2026-07-04","2026-07-11","2026-07-18","2026-07-25",
  "2026-08-01","2026-08-08","2026-08-10","2026-08-12","2026-08-13","2026-08-14","2026-08-15","2026-08-22","2026-08-29",
  "2026-09-05","2026-09-12","2026-09-19","2026-09-26",
  "2026-10-03","2026-10-10","2026-10-17","2026-10-24","2026-10-31",
  "2026-11-07","2026-11-14","2026-11-21","2026-11-28",
  "2026-12-05","2026-12-12","2026-12-19","2026-12-26","2026-12-28","2026-12-29","2026-12-30","2026-12-31",
  "2027-01-02","2027-01-04","2027-01-05","2027-01-09","2027-01-16","2027-01-23","2027-01-30",
  "2027-02-06","2027-02-13","2027-02-20","2027-02-27",
  "2027-03-06","2027-03-13","2027-03-20","2027-03-27"
]);

const months = [
  {year:2026, month:4},
  {year:2026, month:5},
  {year:2026, month:6},
  {year:2026, month:7},
  {year:2026, month:8},
  {year:2026, month:9},
  {year:2026, month:10},
  {year:2026, month:11},
  {year:2026, month:12},
  {year:2027, month:1},
  {year:2027, month:2},
  {year:2027, month:3}
];

const app = document.getElementById("app");
const monthTabs = document.getElementById("monthTabs");
const monthSelect = document.getElementById("monthSelect");
const noticeBox = document.getElementById("noticeBox");

function getDayStatus(key){
  const [y,m,d] = key.split("-").map(Number);
  const dateObj = new Date(y, m - 1, d);
  const isSunday = dateObj.getDay() === 0;
  const isOfficialHoliday = !!officialHolidays[key];
  const isHolidayWorkday = holidayWorkdays.has(key);
  const isCompanyOff = companyOff.has(key);
  const isRecommended = recommended.has(key);
  const isRedOff = isSunday || (isOfficialHoliday && !isHolidayWorkday);

  let status = "出勤日";
  if (isCompanyOff) status = "会社休日";
  else if (isRedOff) status = "休日";
  else if (isOfficialHoliday && isHolidayWorkday) status = "祝日出勤";

  return { isSunday, isOfficialHoliday, isHolidayWorkday, isCompanyOff, isRecommended, isRedOff, status };
}

function buildTabs(){
  months.forEach((m, index) => {
    const btn = document.createElement("button");
    btn.className = "month-tab";
    btn.id = `tab-${index}`;
    btn.textContent = `${m.month}月`;
    btn.onclick = () => jumpToMonth(index);
    monthTabs.appendChild(btn);

    const option = document.createElement("option");
    option.value = index;
    option.textContent = `${m.year}年${m.month}月`;
    monthSelect.appendChild(option);
  });
}

function setActiveTab(index){
  [...monthTabs.children].forEach((el,i)=>el.classList.toggle("active", i===index));
  monthSelect.value = String(index);
}

function jumpToMonth(index){
  document.getElementById(`month-${index}`)?.scrollIntoView({behavior:"smooth", block:"start"});
  setActiveTab(index);
}

function render(){
  app.innerHTML = "";
  months.forEach((m, index) => {
    const firstDay = new Date(m.year, m.month - 1, 1);
    const lastDate = new Date(m.year, m.month, 0).getDate();
    const startWeekday = firstDay.getDay();
    const cells = [];

    for(let i=0; i<startWeekday; i++) cells.push({empty:true});
    for(let d=1; d<=lastDate; d++) cells.push({day:d});
    while(cells.length % 7 !== 0) cells.push({empty:true});

    const holidayEntries = Object.entries(officialHolidays)
      .filter(([k]) => Number(k.slice(0,4)) === m.year && Number(k.slice(5,7)) === m.month)
      .sort(([a],[b]) => a.localeCompare(b));

    const workHolidayEntries = holidayEntries.filter(([k]) => holidayWorkdays.has(k));

    const card = document.createElement("section");
    card.className = "card";
    card.id = `month-${index}`;
    card.innerHTML = `
      <div class="month-title">
        <h2>${m.year}年${m.month}月</h2>
      </div>
      <div class="weekdays">${weekdayLabels.map(w => `<div>${w}</div>`).join("")}</div>
      <div class="grid">
        ${cells.map(c => {
          if(c.empty) return `<div class="day empty"></div>`;
          const key = ymd(m.year, m.month, c.day);
          const status = getDayStatus(key);
          const now = new Date();
          const isToday = now.getFullYear() === m.year && (now.getMonth()+1) === m.month && now.getDate() === c.day;
          const label = status.isOfficialHoliday && status.isHolidayWorkday ? `<div class="daylabel">祝出</div>` : "";
          const todayBadge = isToday ? `<div class="today-badge">今日</div>` : "";
          const cls = [
            "day",
            status.isRedOff ? "sunoff" : "",
            status.isCompanyOff ? "companyoff" : "",
            status.isRecommended ? "recommended" : "",
            isToday ? "today" : ""
          ].filter(Boolean).join(" ");
          return `<div class="${cls}"><span>${c.day}</span>${label}${todayBadge}</div>`;
        }).join("")}
      </div>
      <ul class="holidays">
        ${holidayEntries.length ? holidayEntries.map(([date, name]) => {
          const suffix = holidayWorkdays.has(date) ? "（出勤）" : "";
          return `<li>${date.slice(8)}日 ${name}${suffix}</li>`;
        }).join("") : "<li>祝日なし</li>"}
      </ul>
      ${workHolidayEntries.length ? `<p class="footer-note">※ この月は祝日出勤あり</p>` : ``}
    `;
    app.appendChild(card);
  });
}

function jumpToCurrentFiscalMonth(){
  const now = new Date();
  let index = months.findIndex(m => m.year === now.getFullYear() && m.month === now.getMonth() + 1);
  if(index === -1) index = 0;
  jumpToMonth(index);
}

function updateNotice(){
  const now = new Date();
  const key = ymd(now.getFullYear(), now.getMonth()+1, now.getDate());
  const inAppRange = months.some(m => m.year === now.getFullYear() && m.month === now.getMonth()+1);
  if(!inAppRange){
    noticeBox.textContent = `今日は ${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日。表示対象外の月です。`;
    return;
  }
  const s = getDayStatus(key);
  let msg = `今日は ${now.getMonth()+1}月${now.getDate()}日、${s.status}です。`;
  if (s.isOfficialHoliday) {
    msg += s.isHolidayWorkday ? ` ${officialHolidays[key]}ですが出勤日です。` : ` ${officialHolidays[key]}です。`;
  }
  if (s.isRecommended) msg += ` 有給休暇推奨日です。`;
  noticeBox.textContent = msg;
}

buildTabs();
render();
updateNotice();
setActiveTab(0);

document.getElementById("jumpToday").addEventListener("click", jumpToCurrentFiscalMonth);
monthSelect.addEventListener("change", (e) => {
  if (e.target.value !== "") jumpToMonth(Number(e.target.value));
});

const observer = new IntersectionObserver((entries) => {
  const visible = entries.filter(e => e.isIntersecting).sort((a,b) => b.intersectionRatio - a.intersectionRatio)[0];
  if(visible){
    const index = Number(visible.target.id.replace("month-",""));
    setActiveTab(index);
  }
}, {rootMargin:"-30% 0px -55% 0px", threshold:[0.2,0.5,0.8]});

window.addEventListener("load", () => {
  document.querySelectorAll('[id^="month-"]').forEach(card => observer.observe(card));
  jumpToCurrentFiscalMonth();
});
</script>
</body>
</html>
